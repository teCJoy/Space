<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>teCJoy · Blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11.4.1/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <!-- 使用 markdown-it 替代 marked -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            --bg-dark: #0b0d10;
            --card-bg: rgba(22,24,30,0.68);
            --card-border: rgba(255,255,255,0.05);
            --text-primary: #edeff2;
            --text-secondary: #a1a5b0;
            --accent: #c0e0ff;
            --accent-hover: #d9f0ff;
            --shadow-sm: 0 12px 32px -12px rgba(0,0,0,0.4);
            --blur-amount: 12px;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(60,80,120,0.25) 0%, rgba(10,12,18,0.9) 80%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 16px);
            pointer-events: none;
            z-index: -2;
        }
        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(140,170,220,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }
        .glass-card {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm);
            border-radius: 2rem;
            padding: 2rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.45s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .blog-title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #cdddfc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .back-home {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-home:hover { color: var(--accent); }
        .post-list { list-style: none; margin-top: 1rem; }
        .post-item {
            background: rgba(255,255,255,0.02);
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border: 0.5px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .post-item:hover { background: rgba(255,255,255,0.05); transform: translateX(4px); }
        .post-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 0.3rem;
        }
        .post-title:hover { color: var(--accent); }
        .post-date { font-size: 0.75rem; color: var(--text-secondary); }
        .post-tags { display: inline-flex; gap: 0.5rem; margin-left: 1rem; }
        .tag {
            background: rgba(192,224,255,0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--accent);
        }
        .post-content { margin-top: 1rem; }
        .post-content h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .post-content .post-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
        }
        .post-content h2 { font-size: 1.3rem; margin: 1.2rem 0 0.6rem; color: var(--accent); }
        .post-content p { margin: 0.8rem 0; line-height: 1.6; }
        .post-content code {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .post-content pre {
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
        }
        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            color: var(--text-secondary);
            margin: 1rem 0;
        }
        .post-content img, .post-content iframe, .post-content video {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            display: block;
            margin: 1rem auto;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--accent);
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .loading, .error { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .error { color: #ffaaaa; }
        .katex-display { overflow-x: auto; overflow-y: hidden; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card" id="app">
        <div class="blog-header">
            <div class="blog-title">Logbook</div>
            <a href="https://space-6oo.pages.dev/bio" class="back-home">← Home</a>
        </div>
        <div id="content"><div class="loading">Loading...</div></div>
    </div>
</div>

<script>
    // 初始化 markdown-it
    let md;
    if (typeof markdownit !== 'undefined') {
        md = markdownit({
            html: true,        // 允许 HTML 标签（如 iframe）
            linkify: true,
            typographer: true,
            breaks: true
        });
    } else {
        console.error('markdown-it not loaded');
    }

    // 初始化 Mermaid
    if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            securityLevel: 'loose',
            themeVariables: {
                background: 'transparent',
                primaryColor: '#c0e0ff',
                primaryBorderColor: '#a1a5b0',
                primaryTextColor: '#edeff2',
                lineColor: '#a1a5b0',
                secondaryColor: '#2d2d3a',
                tertiaryColor: '#2d2d3a'
            }
        });
    }

    function getQueryParam(param) {
        return new URLSearchParams(window.location.search).get(param);
    }

    const postParam = getQueryParam('post');
    const contentDiv = document.getElementById('content');

    function renderMath() {
        if (typeof renderMathInElement === 'function') {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });
        }
    }

    function renderMermaid() {
        if (typeof mermaid === 'undefined') return;
        const blocks = document.querySelectorAll('.post-content pre code.language-mermaid, .post-content pre code.mermaid');
        blocks.forEach(block => {
            const code = block.textContent;
            const pre = block.parentElement;
            if (pre && pre.tagName === 'PRE') {
                const div = document.createElement('div');
                div.className = 'mermaid';
                div.textContent = code;
                pre.parentNode.replaceChild(div, pre);
            }
        });
        const merm = document.querySelectorAll('.mermaid');
        if (merm.length) mermaid.run({ nodes: merm }).catch(e => console.warn(e));
    }

    async function loadPostList() {
        try {
            const res = await fetch('./posts.json');
            if (!res.ok) throw new Error('Failed to load posts');
            let posts = await res.json();
            posts.sort((a,b) => new Date(b.date) - new Date(a.date));
            if (!posts.length) {
                contentDiv.innerHTML = '<div class="error">No posts yet. Stay tuned!</div>';
                return;
            }
            let html = '<ul class="post-list">';
            for (let p of posts) {
                html += `<li class="post-item">
                    <a href="?post=${encodeURIComponent(p.filename)}" class="post-title">${escapeHtml(p.title)}</a>
                    <div class="post-date">${p.date} ${p.tags ? `<span class="post-tags">${p.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</span>` : ''}</div>
                </li>`;
            }
            html += '</ul>';
            contentDiv.innerHTML = html;
        } catch(e) {
            contentDiv.innerHTML = `<div class="error">Error: ${e.message}</div>`;
        }
    }

    async function loadPost(filename) {
        try {
            const res = await fetch(`./posts/${filename}`);
            if (!res.ok) throw new Error('Post not found');
            let mdText = await res.text();
            let title = filename.replace(/\.md$/, '').replace(/-/g, ' ');
            const titleMatch = mdText.match(/^#\s+(.+)$/m);
            if (titleMatch) title = titleMatch[1];
            let htmlContent;
            if (md) {
                htmlContent = md.render(mdText);
            } else {
                throw new Error('Markdown parser not loaded');
            }
            contentDiv.innerHTML = `
                <div class="post-content">
                    <h1>${escapeHtml(title)}</h1>
                    <div class="post-meta">[Date] ${new Date().toISOString().slice(0,10)}</div>
                    ${htmlContent}
                    <a href="?back=true" class="back-link" id="backToList">← Back to list</a>
                </div>
            `;
            renderMath();
            renderMermaid();
            document.getElementById('backToList')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.history.pushState({}, '', window.location.pathname);
                loadPostList();
            });
        } catch(e) {
            contentDiv.innerHTML = `<div class="error">Failed to load post: ${e.message}</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    if (postParam) {
        loadPost(postParam);
    } else {
        loadPostList();
    }

    window.addEventListener('popstate', () => {
        const p = getQueryParam('post');
        if (p) loadPost(p);
        else loadPostList();
    });
</script>
</body>
</html>
