<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>teCJoy · Blog</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            --bg-dark: #0b0d10;
            --card-bg: rgba(22, 24, 30, 0.68);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-primary: #edeff2;
            --text-secondary: #a1a5b0;
            --accent: #c0e0ff;
            --accent-hover: #d9f0ff;
            --shadow-sm: 0 12px 32px -12px rgba(0, 0, 0, 0.4);
            --blur-amount: 12px;

            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(60, 80, 120, 0.25) 0%, rgba(10, 12, 18, 0.9) 80%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 16px);
            pointer-events: none;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(140, 170, 220, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .glass-card {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm);
            border-radius: 2rem;
            padding: 2rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.45s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* header */
        .blog-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .blog-title {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #cdddfc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .back-home {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-home:hover {
            color: var(--accent);
        }

        /* post list */
        .post-list {
            list-style: none;
            margin-top: 1rem;
        }
        .post-item {
            background: rgba(255,255,255,0.02);
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            transition: background 0.2s, transform 0.1s;
            border: 0.5px solid rgba(255,255,255,0.05);
        }
        .post-item:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(4px);
        }
        .post-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 0.3rem;
        }
        .post-title:hover {
            color: var(--accent);
        }
        .post-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .post-tags {
            display: inline-flex;
            gap: 0.5rem;
            margin-left: 1rem;
        }
        .tag {
            background: rgba(192,224,255,0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--accent);
        }

        /* post detail */
        .post-content {
            margin-top: 1rem;
        }
        .post-content h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .post-content .post-meta {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
        }
        .post-content h2 {
            font-size: 1.3rem;
            margin: 1.2rem 0 0.6rem;
            color: var(--accent);
        }
        .post-content p {
            margin: 0.8rem 0;
            line-height: 1.6;
        }
        .post-content code {
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .post-content pre {
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
        }
        .post-content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 1rem;
            color: var(--text-secondary);
            margin: 1rem 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--accent);
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .error {
            color: #ffaaaa;
            text-align: center;
            padding: 2rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="container">
    <div class="glass-card" id="app">
        <div class="blog-header">
            <div class="blog-title">Logbook</div>
            <a href="https://space-6oo.pages.dev/bio" class="back-home">← Home</a>
        </div>
        <div id="content">
            <div class="loading">Loading...</div>
        </div>
    </div>
</div>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    const postParam = getQueryParam('post');
    const contentDiv = document.getElementById('content');

    async function loadPostList() {
        try {
            const res = await fetch('./posts.json');
            if (!res.ok) throw new Error('Failed to load posts');
            const posts = await res.json();
            posts.sort((a, b) => new Date(b.date) - new Date(a.date));
            if (posts.length === 0) {
                contentDiv.innerHTML = '<div class="error">No posts yet. Stay tuned!</div>';
                return;
            }
            let html = '<ul class="post-list">';
            for (const post of posts) {
                html += `
                    <li class="post-item">
                        <a href="?post=${encodeURIComponent(post.filename)}" class="post-title">${escapeHtml(post.title)}</a>
                        <div class="post-date">${post.date} ${post.tags ? `<span class="post-tags">${post.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</span>` : ''}</div>
                    </li>
                `;
            }
            html += '</ul>';
            contentDiv.innerHTML = html;
        } catch (err) {
            contentDiv.innerHTML = `<div class="error">Error: ${err.message}</div>`;
        }
    }

    async function loadPost(filename) {
        try {
            const res = await fetch(`./posts/${filename}`);
            if (!res.ok) throw new Error('Post not found');
            const markdown = await res.text();
            const htmlContent = marked.parse(markdown);
            let title = filename.replace(/\.md$/, '').replace(/-/g, ' ');
            contentDiv.innerHTML = `
                <div class="post-content">
                    <h1>${escapeHtml(title)}</h1>
                    <div class="post-meta">[Date] ${new Date().toISOString().slice(0,10)}</div>
                    ${htmlContent}
                    <a href="?back=true" class="back-link" id="backToList">← Back to list</a>
                </div>
            `;
            document.getElementById('backToList')?.addEventListener('click', (e) => {
                e.preventDefault();
                window.history.pushState({}, '', window.location.pathname);
                loadPostList();
            });
        } catch (err) {
            contentDiv.innerHTML = `<div class="error">Failed to load post: ${err.message}</div>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    if (postParam) {
        loadPost(postParam);
    } else {
        loadPostList();
    }

    window.addEventListener('popstate', () => {
        const newPost = getQueryParam('post');
        if (newPost) {
            loadPost(newPost);
        } else {
            loadPostList();
        }
    });
</script>
</body>
</html>
