<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="teCJoy's Space">
    <title>teCJoy | Space</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            --bg-dark: #0b0d10;
            --card-bg: rgba(22, 24, 30, 0.68);
            --card-border: rgba(255, 255, 255, 0.05);
            --text-primary: #edeff2;
            --text-secondary: #a1a5b0;
            --accent: #c0e0ff;
            --accent-hover: #d9f0ff;
            --shadow-sm: 0 12px 32px -12px rgba(0, 0, 0, 0.4);
            --blur-amount: 12px;

            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(60, 80, 120, 0.25) 0%, rgba(10, 12, 18, 0.9) 80%),
                        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 16px);
            pointer-events: none;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(140, 170, 220, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.2s ease;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            gap: 1.5rem;
        }

        /* 玻璃基底 + 浮动入场 */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            animation: floatGlowIn 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
        }
        .glass:hover {
            box-shadow: 0 20px 40px -16px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08) inset;
            transform: translateY(-2px);
        }

        @keyframes floatGlowIn {
            0% {
                opacity: 0;
                transform: translateY(18px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 顶部长条：包裹头像 + 博客链接 */
        .profile-bar {
            max-width: 600px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0;
            border-radius: 60px;
            padding: 0;
            transition: all 0.2s ease;
            height: 120px;
            overflow: hidden;
        }
        .profile-left {
            display: flex;
            align-items: center;
            gap: 0;
            flex: 1;
        }
        .profile-bar:hover {
            background: rgba(28, 32, 42, 0.6);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .avatar {
            flex-shrink: 0;
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #d9e6ff, #a3c0f0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            margin-left: 12px;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .avatar:hover {
            transform: scale(1.02);
        }

        .info-group {
            flex: 1;
            padding: 0 1.5rem 0 1rem;
            overflow: hidden;
        }
        .name {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            line-height: 1.2;
            background: linear-gradient(135deg, #ffffff, #cdddfc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.4rem;
        }
        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(80, 180, 120, 0.12);
            padding: 0.25rem 0.9rem 0.25rem 0.8rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #b2f0cf;
            backdrop-filter: blur(2px);
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #7ae9b5;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 4px #6bcfa0;
            animation: pulse 1.8s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* 博客链接按钮 */
        .blog-link {
            margin-right: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            border: 0.5px solid rgba(255,255,255,0.1);
            text-decoration: none;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .blog-link:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
            color: var(--accent);
            border-color: rgba(255,255,255,0.2);
        }

        /* 内容卡片 */
        .content-card {
            max-width: 600px;
            width: 100%;
            border-radius: 2rem;
            padding: 2rem;
        }

        .interests-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            letter-spacing: 0.3px;
            border-left: 3px solid var(--accent);
            padding-left: 0.8rem;
        }

        .interests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1.2rem;
            margin-bottom: 1.8rem;
        }

        .interest-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            border-radius: 1.2rem;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 0.5px solid rgba(255,255,255,0.05);
            cursor: default;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0.5rem;
            overflow: hidden;
        }
        .interest-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.15);
            aspect-ratio: auto;
            justify-content: flex-start;
            padding-bottom: 0.8rem;
        }

        .interest-icon {
            width: 44px;
            height: 44px;
            display: block;
            margin: 0 auto;
            transition: transform 0.2s;
        }
        .interest-icon svg {
            width: 100%;
            height: 100%;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
            color: #eef2ff;
        }
        .interest-card:hover .interest-icon {
            transform: scale(1.02);
            margin-top: 0.4rem;
        }

        .interest-label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            display: none;
            margin-top: 0.4rem;
        }
        .interest-desc {
            display: none;
        }
        .interest-card:hover .interest-label {
            display: block;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: rgba(192, 224, 255, 0.35);
            margin: 1rem 0 1.2rem 0;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .content-card:hover .divider {
            width: 56px;
        }

        .contact-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
            margin: 1.2rem 0 1rem 0;
        }
        .contact-item {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
            padding: 0.6rem;
            border-radius: 50%;
            border: 0.5px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease;
            text-decoration: none;
            color: #eef2ff;
        }
        .contact-item svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
            transition: all 0.2s;
            display: block;
        }
        .contact-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255,255,255,0.2);
            color: var(--accent-hover);
        }
        .contact-item span {
            display: none;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #6f768b;
            text-align: center;
            border-top: 0.5px solid rgba(255,255,255,0.05);
            padding-top: 1.2rem;
            transition: color 0.2s;
        }
        .content-card:hover .footer-note {
            color: #8890a0;
        }

        @media (max-width: 540px) {
            .container {
                padding: 1.5rem 1rem;
                gap: 1.2rem;
            }
            .profile-bar {
                height: 100px;
                border-radius: 50px;
            }
            .avatar {
                width: 80px;
                height: 80px;
                margin-left: 10px;
            }
            .name {
                font-size: 1.3rem;
            }
            .status-dot {
                font-size: 0.65rem;
                padding: 0.2rem 0.7rem;
            }
            .info-group {
                padding: 0 1rem;
            }
            .blog-link {
                margin-right: 1rem;
                padding: 0.3rem 0.8rem;
                font-size: 0.75rem;
            }
            .content-card {
                padding: 1.5rem;
            }
            .interests-grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 0.8rem;
            }
            .interest-icon {
                width: 36px;
                height: 36px;
            }
            .contact-links {
                gap: 1rem;
            }
            .contact-item {
                padding: 0.5rem;
            }
            .contact-item svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>

<script>
    (function() {
        document.getElementById('currentYear').innerText = new Date().getFullYear();

        let body = document.body;
        let timeoutId;
        function updateGlow(e) {
            let x = e.clientX / window.innerWidth * 100;
            let y = e.clientY / window.innerHeight * 100;
            body.style.setProperty('--x', x + '%');
            body.style.setProperty('--y', y + '%');
            if (timeoutId) clearTimeout(timeoutId);
            timeoutId = setTimeout(() => {
                if (!document.querySelector('.glass:hover')) {
                    body.style.setProperty('--x', '50%');
                    body.style.setProperty('--y', '50%');
                }
            }, 600);
        }
        window.addEventListener('mousemove', updateGlow);
        if ('ontouchstart' in window) {
            window.removeEventListener('mousemove', updateGlow);
        }
    })();
</script>
